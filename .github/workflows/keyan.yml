name: Build ip set
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Install packages
        run: |
          sudo apt-get update && sudo apt-get install -y bgpdump html2text
          cargo install --vers 0.0.3 bgptools

      - name: Set variables
        run: |
          echo "PATH=$(go env GOPATH)/bin:${PATH}" >> $GITHUB_ENV
          echo "IP6UPSTREAM=http://archive.routeviews.org/route-views6/bgpdata" >> $GITHUB_ENV
          echo "MONTH6=$(date -u +%Y.%m)" >> $GITHUB_ENV

      - name: Checkout codebase
        uses: actions/checkout@v5

      - name: Generate AS table
        run: curl -sSL https://bgp.potaroo.net/cidr/autnums.html | awk '-F[<>]' '{print $3,$5}' | grep '^AS' > asnames.txt

      - name: Fetch bgp data
        run: |
          curl -f --retry 3 --retry-delay 4 -o rib.bz2 "http://archive.routeviews.org/dnszones/rib.bz2"
          LATEST6=$(curl -sL ${{ env.IP6UPSTREAM }}/${{ env.MONTH6 }}/RIBS|html2text|grep bz2|awk '{print $3}'|tail -n 1)
          TAG_NAME=$(echo ${LATEST6}|awk '{gsub("(rib.|.bz2)",""); print $1}')
          curl -f --retry 3 --retry-delay 4 -o rib6.bz2 "$IP6UPSTREAM/$MONTH6/RIBS/$LATEST6"
          echo "RELEASE_NAME=${TAG_NAME}" >> $GITHUB_ENV

      - name: Dump v4 bgp date
        run: |
          echo "running bgpdump ..."
          bgpdump -m -O rib.txt rib.bz2
          echo "finish bgpdump"

      - name: Dump v6 bgp date
        run: |
          echo "running bgpdump ..."
          bgpdump -m -O rib6.txt rib6.bz2
          echo "finish bgpdump"

      - name: Generate China IP list
        run: |
          cat asnames.txt | grep -P "CN\$" | grep -vPi "AS45102" | awk '{gsub(/AS/, ""); print $1}' > cnasn.list
          cat cnasn.list | xargs bgptools -b rib.txt > cn4.txt
          cat cnasn.list | xargs bgptools -b rib6.txt > cn6.txt
          bgptools -b rib.txt 45102 > AS45102-ipv4.txt
          bgptools -b rib6.txt 45102 > AS45102-ipv6.txt

      - name: Get geoip-cli
        run: |
          curl -f --retry 3 --retry-delay 4 -o geoip -L 'https://github.com/letsky192/geoip/releases/latest/download/geoip-linux-amd64-v3'
          chmod u+x ./geoip

      - name: Build pure ip list
        run: |
          mkdir publish
          ./geoip convert -c ./config.json
          echo "release_name=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Git push assets to "release" branch
        run: |
          cd publish
          git init -b release
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m '${{ env.release_name }}'
          git remote add origin 'https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}.git'
          git push -f -u origin release
